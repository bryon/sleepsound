<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Sleep Sounds</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>
<body>
  <main>
    <h1>Sleep Sounds</h1>

    <div class="noise-types">
      <button class="noise-btn" data-type="white">White</button>
      <button class="noise-btn" data-type="pink">Pink</button>
      <button class="noise-btn active" data-type="brown">Brown</button>
    </div>

    <button id="play-btn" class="play-button">&#9654;</button>

    <div class="slider-section">
      <span class="slider-label">&#128264;</span>
      <input type="range" id="volume" min="0" max="100" value="70">
      <span class="slider-label">&#128266;</span>
    </div>

    <div class="slider-section">
      <span class="slider-label">Deep</span>
      <input type="range" id="tone" min="0" max="100" value="100">
      <span class="slider-label">Bright</span>
    </div>

    <div class="timer-section">
      <div class="timer-controls">
        <span class="timer-selected" id="timer-selected">8h</span>
        <input type="range" id="timer-slider" min="0.5" max="12" step="0.5" value="8">
        <button class="timer-infinity" id="infinity-btn">&infin;</button>
      </div>
      <div id="timer-display">8:00:00</div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
